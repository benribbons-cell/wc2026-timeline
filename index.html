/* ── RESET & BASE ─────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#060d1a;color:#dde4f0;padding:12px 10px;}
h1{text-align:center;font-size:17px;font-weight:800;color:#fff;margin-bottom:2px;}
.subtitle{text-align:center;font-size:11px;color:#7788aa;margin-bottom:10px;}

/* ── STATS BAR ───────────────────────────────────── */
.stats-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-bottom:10px;}
.stat{background:#0e1828;border:1px solid #1c2e50;border-radius:7px;padding:6px 12px;text-align:center;min-width:78px;}
.stat-num{font-size:20px;font-weight:800;}
.stat-label{font-size:9px;color:#7788aa;margin-top:1px;line-height:1.3;}

/* ── LEGEND ──────────────────────────────────────── */
.legend{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-bottom:9px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#aabbcc;}
.ldot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* ── CONTROLS ────────────────────────────────────── */
.controls{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin-bottom:8px;}
.btn{background:#0e1828;border:1px solid #1c2e50;color:#99aac8;border-radius:5px;padding:5px 11px;font-size:10px;cursor:pointer;transition:.12s;-webkit-tap-highlight-color:transparent;}
.btn:hover,.btn.active{background:#1a3a6e;border-color:#3a6abf;color:#fff;}
.btn-export{background:#1a3020;border-color:#2a6040;color:#66ffaa;}
.btn-export:hover{background:#1e4030;border-color:#3a8060;}

/* ── EXPORT OVERLAY ──────────────────────────────── */
#exportMsg{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:#0e1828;border:1px solid #3a6abf;border-radius:10px;padding:20px 30px;
  text-align:center;color:#fff;font-size:13px;z-index:99999;}

/* ══════════════════════════════════════════════════
   DESKTOP TIMELINE (≥ 768px)
══════════════════════════════════════════════════ */
.desktop-view{display:block;}
.mobile-view{display:none;}

.hour-axis-wrap{position:relative;height:18px;margin-left:80px;margin-right:3px;margin-bottom:3px;}
.phase-header{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:#3a66cc;margin:10px 0 3px;border-left:3px solid #3a66cc;padding-left:7px;}
.day-row{display:flex;gap:6px;margin-bottom:3px;align-items:stretch;}
.day-label{width:72px;flex-shrink:0;font-size:9px;color:#556688;text-align:right;padding-top:5px;line-height:1.3;}
.day-label strong{display:block;font-size:11px;color:#8899bb;}
.track{flex:1;background:#0b1524;border:1px solid #172040;border-radius:5px;position:relative;overflow:hidden;}
.track-band{position:absolute;top:0;bottom:0;pointer-events:none;}
.pill{position:absolute;border-radius:3px;display:flex;align-items:center;padding:0 4px;
  font-size:8px;font-weight:600;white-space:nowrap;overflow:hidden;cursor:pointer;transition:.1s;z-index:2;}
.pill:hover{z-index:20;transform:scaleY(1.2);overflow:visible;box-shadow:0 3px 14px rgba(0,0,0,.8);}

/* ── TOOLTIP (desktop) ───────────────────────────── */
.tip{position:fixed;background:#0c1830;border:1px solid #25458a;border-radius:7px;
  padding:9px 13px;font-size:11px;z-index:9999;pointer-events:none;max-width:230px;
  box-shadow:0 4px 22px rgba(0,0,0,.85);display:none;}
.tip-match{font-weight:700;color:#fff;font-size:12px;margin-bottom:3px;}
.tip-group{color:#ffcc44;font-size:10px;margin-bottom:2px;}
.tip-time{color:#55aaff;margin-bottom:2px;}
.tip-venue{color:#778899;font-size:10px;}
.tip-band{font-size:10px;margin-top:4px;}

/* Mobile: body scrolls naturally at fixed 1100px viewport width */
body { min-width: 900px; }

/* Pill colours */
.c-prime   {background:#14602e;color:#80ffaa;border:1px solid #20884a;}
.c-evening {background:#143870;color:#80c4ff;border:1px solid #2055aa;}
.c-night   {background:#501520;color:#ffaaaa;border:1px solid #80253a;}
.c-day     {background:#5a4a08;color:#ffe060;border:1px solid #8a7018;}
.c-england {background:#7a0000;color:#ffcccc;border:2px solid #ff3333;}

function fmtT(h){const hh=Math.floor(h)%24;const mm=Math.round((h%1)*60);return hh.toString().padStart(2,"0")+":"+mm.toString().padStart(2,"0")+" BST";}

  });
  const totalR=Math.max(...dayFX.map(f=>f._ri))+1;
  track.style.minHeight=(totalR*(PH+GAP)+6)+"px";
  dayFX.forEach(f=>{
    const h=f[2];
    const pill=document.createElement("div");
    pill.className="pill "+cClass(f);
    pill.dataset.band=band(h);pill.dataset.eng=f[7]?"yes":"no";
    const top=3+f._ri*(PH+GAP);
    pill.style.cssText=`left:${hToX(h)}%;top:${top}px;height:${PH}px;width:${Math.max(1.4,hRangeW(h,Math.min(h+1.2,24)))}%;min-width:7px;`;
    const lbl2=f[7]?`🏴󠁧󠁢󠁥󠁮󠁧󠁿 ${f[3]} vs ${f[4]}`:(f[4]?`${f[3]} vs ${f[4]}`:f[3]);
    pill.innerHTML=`<span style="overflow:hidden;text-overflow:ellipsis">${lbl2}</span>`;
    const showTip=(h,f)=>{
      const m=f[4]?`${f[3]} vs ${f[4]}`:f[3];
      const eng=f[7]?`<span style="background:#7a0000;color:#ffcccc;border:1px solid #ff3333;border-radius:3px;font-size:8px;padding:1px 5px;margin-left:4px">🏴󠁧󠁢󠁥󠁮󠁧󠁿 ENG</span>`:"";
      tip.innerHTML=`<div class="tip-match">${m}${eng}</div><div class="tip-group">${f[5]}</div><div class="tip-time">⏱ ${fmtT(h)}</div><div class="tip-venue">📍 ${f[6]}</div><div class="tip-band">${bandLabel(band(h))}</div>`;
      tip.style.display="block";
    };
    pill.addEventListener("mouseenter",e=>{ showTip(h,f); });
    pill.addEventListener("mousemove",e=>{
      let x=e.clientX+14,y=e.clientY-10;
      if(x+240>window.innerWidth)x=e.clientX-250;
      if(y+120>window.innerHeight)y=e.clientY-120;
      tip.style.left=x+"px";tip.style.top=y+"px";tip.style.bottom="auto";tip.style.right="auto";tip.style.maxWidth="230px";
    });
    pill.addEventListener("mouseleave",()=>tip.style.display="none");
    pill.addEventListener("touchstart",e=>{
      e.preventDefault();
      showTip(h,f);
      // On mobile, pin tip to bottom of screen
      tip.style.left="8px"; tip.style.right="8px"; tip.style.bottom="12px"; tip.style.top="auto"; tip.style.maxWidth="none";
    },{passive:false});
    pill.addEventListener("touchend",()=>setTimeout(()=>tip.style.display="none",2000));
    track.appendChild(pill);
  });
  row.appendChild(track);tl.appendChild(row);
});

// ── FILTER ─────────────────────────────────────────────────────────────
let currentFilter="all";
function setF(f,btn){
  currentFilter=f;
  document.querySelectorAll(".btn:not(.btn-export)").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".pill").forEach(p=>{
    const show=f==="all"||(f==="england"&&p.dataset.eng==="yes")||(f!=="england"&&p.dataset.band===f);
    p.style.opacity=show?"1":"0.06";
  });
}

// ── EXPORT ──────────────────────────────────────────────────────────────
async function doExport(type){
  const msg=document.getElementById("exportMsg");
  tip.style.display="none";
  msg.style.display="block";
  msg.textContent="⏳ Rendering… this may take a few seconds";
  await new Promise(r=>setTimeout(r,80));
  try{
    const canvas=await html2canvas(document.body,{
      backgroundColor:"#060d1a",scale:2,useCORS:true,logging:false,
      windowWidth:document.body.scrollWidth,windowHeight:document.body.scrollHeight,scrollX:0,scrollY:0,
    });
    if(type==="jpeg"){
      const a=document.createElement("a");a.download="wc2026_bst_timeline.jpg";
      a.href=canvas.toDataURL("image/jpeg",0.95);a.click();
    }else{
      const{jsPDF}=window.jspdf;
      const r=canvas.height/canvas.width;
      const pw=297,ph2=Math.min(pw*r,1200);
      const pdf=new jsPDF({orientation:"landscape",unit:"mm",format:[pw,ph2]});
      pdf.addImage(canvas.toDataURL("image/jpeg",0.95),"JPEG",0,0,pw,ph2);
      pdf.save("wc2026_bst_timeline.pdf");
    }
  }catch(e){msg.textContent="❌ Export failed: "+e.message;await new Promise(r=>setTimeout(r,2000));}
  msg.style.display="none";
}
function exportPDF(){doExport("pdf");}
function exportJPEG(){doExport("jpeg");}
