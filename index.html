* { box-sizing:border-box; margin:0; padding:0; }

.subtitle { text-align:center; font-size:11px; color:#7788aa; margin-bottom:10px; }

.stats-bar { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-bottom:10px; }
.stat { background:#0e1828; border:1px solid #1c2e50; border-radius:7px; padding:6px 14px; text-align:center; min-width:82px; }
.stat-num { font-size:20px; font-weight:800; }
.stat-label { font-size:9px; color:#7788aa; margin-top:1px; line-height:1.3; }

.legend { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-bottom:9px; }
.legend-item { display:flex; align-items:center; gap:4px; font-size:10px; color:#aabbcc; }
.ldot { width:11px; height:11px; border-radius:2px; flex-shrink:0; }

.controls { display:flex; flex-wrap:wrap; justify-content:center; gap:6px; margin-bottom:8px; }
.btn { background:#0e1828; border:1px solid #1c2e50; color:#99aac8; border-radius:5px; padding:4px 11px; font-size:10px; cursor:pointer; transition:.12s; }
.btn:hover,.btn.active { background:#1a3a6e; border-color:#3a6abf; color:#fff; }
.btn-export { background:#1a3020; border-color:#2a6040; color:#66ffaa; }
.btn-export:hover { background:#1e4030; border-color:#3a8060; }

/* Non-linear axis: segments map logical ranges to visual widths */
/* Segments: 0-1(mid-eve), 1-6(night), 6-17(dead/compressed), 17-23(prime), 23-24(late) */
/* Visual widths: 4%, 22%, 8%, 46%, 8%  = 88% for track (rest is label) */
/* Breakpoints as % of track width */

.hour-axis-wrap { display:flex; margin-left:86px; margin-right:3px; margin-bottom:3px; }
.axis-seg { position:relative; font-size:9px; color:#2a3a5a; text-align:center; }
.axis-seg-label { position:absolute; bottom:0; left:50%; transform:translateX(-50%); white-space:nowrap; }

.page-wrap { overflow-y:visible; }

.phase-header {
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px;
  color:#3a66cc; margin:10px 0 3px;
  border-left:3px solid #3a66cc; padding-left:7px;
}

.day-row { display:flex; gap:6px; margin-bottom:3px; align-items:stretch; }
.day-label { width:78px; flex-shrink:0; font-size:9.5px; color:#556688; text-align:right; padding-top:5px; line-height:1.3; }
.day-label strong { display:block; font-size:11px; color:#8899bb; }

.track {
  flex:1; background:#0b1524; border:1px solid #172040;
  border-radius:5px; position:relative; overflow:hidden;
}

/* Segment background bands */
.track-band { position:absolute; top:0; bottom:0; pointer-events:none; }

.pill {
  position:absolute; border-radius:3px;
  display:flex; align-items:center; padding:0 4px;
  font-size:8px; font-weight:600; white-space:nowrap;
  overflow:hidden; cursor:pointer; transition:.1s; z-index:2;
}
.pill:hover { z-index:20; transform:scaleY(1.2); overflow:visible; box-shadow:0 3px 14px rgba(0,0,0,.8); }
.c-prime   { background:#14602e; color:#80ffaa; border:1px solid #20884a; }
.c-evening { background:#143870; color:#80c4ff; border:1px solid #2055aa; }
.c-night   { background:#501520; color:#ffaaaa; border:1px solid #80253a; }
.c-day     { background:#5a4a08; color:#ffe060; border:1px solid #8a7018; }
.c-england { background:#7a0000; color:#ffcccc; border:2px solid #ff3333; }

/* Compressed midday zone indicator */
.compress-label {
  position:absolute; top:50%; transform:translateY(-50%);
  font-size:7.5px; color:#334; text-align:center; line-height:1.2;
  pointer-events:none;
}

.tip {
  position:fixed; background:#0c1830; border:1px solid #25458a;
  border-radius:7px; padding:9px 13px; font-size:11px;
  z-index:9999; pointer-events:none; max-width:230px;
  box-shadow:0 4px 22px rgba(0,0,0,.85); display:none;
}
.tip-match { font-weight:700; color:#fff; font-size:12px; margin-bottom:3px; }
.tip-group { color:#ffcc44; font-size:10px; margin-bottom:2px; }
.tip-time  { color:#55aaff; margin-bottom:2px; }
.tip-venue { color:#778899; font-size:10px; }
.tip-band  { font-size:10px; margin-top:4px; }

/* Export overlay */
#exportMsg { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:#0e1828; border:1px solid #3a6abf; border-radius:10px; padding:20px 30px;
  text-align:center; color:#fff; font-size:13px; z-index:99999; }
</style>

const SEG = [
  {s:0,  e:1,  w:6},   // midnight–1am (late evening overflow)
  {s:1,  e:6,  w:20},  // 1am–6am night
  {s:6,  e:17, w:8},   // 6am–5pm dead zone (COMPRESSED)
  {s:17, e:23, w:48},  // 5pm–11pm prime
  {s:23, e:24, w:18},  // 11pm–midnight late evening

// Precompute cumulative left% for each segment start
function hToX(h) {
  let left = 0;
  for (const seg of SEG) {
    if (h <= seg.s) break;
    if (h >= seg.e) { left += seg.w; continue; }
    // h is inside this seg
    left += ((h - seg.s) / (seg.e - seg.s)) * seg.w;
    break;
  }
  return left;
}

function hRangeW(h1, h2) {
  return hToX(h2) - hToX(h1);
}

function bandLabel(b){ return b==="prime"?"🟢 Prime Time (5–10:59pm BST)":b==="evening"?"🔵 Late Evening (11pm–12:59am BST)":b==="night"?"🔴 Night Owl (1–5:59am BST)":"🟡 Afternoon (6am–4:59pm BST)"; }

function fmtT(h){ const hh=Math.floor(h)%24; const mm=Math.round((h%1)*60); return hh.toString().padStart(2,"0")+":"+mm.toString().padStart(2,"0")+" BST"; }

    "rgba(20,40,80,0.14)",  // 23-24
  ];
  SEG.forEach((seg,i)=>{
    const band=document.createElement("div"); band.className="track-band";
    band.style.left=hToX(seg.s)+"%";
    band.style.width=seg.w+"%";
    band.style.background=segColors[i];
    track.appendChild(band);
  });

  // Compressed zone marker
  const cz=document.createElement("div"); cz.className="compress-label";
  cz.style.left=(hToX(6)+hRangeW(6,17)/2)+"%";
  cz.style.width=hRangeW(6,17)+"%";
  cz.style.transform="translateY(-50%)";
  cz.style.marginLeft="-"+(hRangeW(6,17)/2)+"%";
  const compDiv=document.createElement("div");
  compDiv.style.cssText=`position:absolute;top:0;bottom:0;left:${hToX(6)}%;width:${hRangeW(6,17)}%;display:flex;align-items:center;justify-content:center;pointer-events:none;`;
  compDiv.innerHTML=`<span style="font-size:7px;color:#5577aa;writing-mode:horizontal-tb">╠ compressed ╣</span>`;
  track.appendChild(compDiv);

  // Stagger pills
  const dayFX=dayMap[dk];
  const slots=[];
  dayFX.forEach(f=>{
    const h=f[2]; let ri=0;
    // Use visual position for overlap detection
    const vx=hToX(h);
    while(slots[ri]!==undefined&&slots[ri]>vx) ri++;
    slots[ri]=vx+7; // visual width buffer
    f._ri=ri;
  });
  const totalR=Math.max(...dayFX.map(f=>f._ri))+1;
  track.style.minHeight=(totalR*(PH+GAP)+6)+"px";

  dayFX.forEach(f=>{
    const h=f[2];
    const pill=document.createElement("div");
    pill.className="pill "+cClass(f);
    pill.dataset.band=band(h);
    pill.dataset.eng=f[7]?"yes":"no";
    const top=3+f._ri*(PH+GAP);
    const left=hToX(h);
    const w=Math.max(1.4, hRangeW(h, Math.min(h+1.2, h<23?h+1.2:24)));

    pill.style.cssText=`left:${left}%;top:${top}px;height:${PH}px;width:${w}%;min-width:7px;`;
    const lbl2=f[7]?`🏴󠁧󠁢󠁥󠁮󠁧󠁿 ${f[3]} vs ${f[4]}`:(f[4]?`${f[3]} vs ${f[4]}`:f[3]);
    pill.innerHTML=`<span style="overflow:hidden;text-overflow:ellipsis">${lbl2}</span>`;

    pill.addEventListener("mouseenter",e=>{
      const m=f[4]?`${f[3]} vs ${f[4]}`:f[3];
      const eng=f[7]?`<span style="background:#7a0000;color:#ffcccc;border:1px solid #ff3333;border-radius:3px;font-size:8px;padding:1px 4px;margin-left:4px">🏴󠁧󠁢󠁥󠁮󠁧󠁿 England</span>`:'';
      tip.innerHTML=`<div class="tip-match">${m}${eng}</div><div class="tip-group">${f[5]}</div><div class="tip-time">⏱ ${fmtT(h)}</div><div class="tip-venue">📍 ${f[6]}</div><div class="tip-band">${bandLabel(band(h))}</div>`;
      tip.style.display="block";
    });
    pill.addEventListener("mousemove",e=>{
      let x=e.clientX+14,y=e.clientY-10;
      if(x+240>window.innerWidth)x=e.clientX-250;
      if(y+120>window.innerHeight)y=e.clientY-120;
      tip.style.left=x+"px"; tip.style.top=y+"px";
    });
    pill.addEventListener("mouseleave",()=>tip.style.display="none");
    track.appendChild(pill);
  });

  row.appendChild(track);
  tl.appendChild(row);
});

function setF(f,btn){
  document.querySelectorAll(".btn:not(.btn-export)").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".pill").forEach(p=>{
    const show=f==="all"||(f==="england"&&p.dataset.eng==="yes")||(f!=="england"&&p.dataset.band===f);
    p.style.opacity=show?"1":"0.06";
  });
}

// Export functions
async function doExport(type) {
  const msg=document.getElementById("exportMsg");
  const tip=document.getElementById("tip");
  tip.style.display="none";
  msg.style.display="block";
  msg.textContent="⏳ Rendering… this may take a few seconds";
  await new Promise(r=>setTimeout(r,80));

  try {
    const target=document.body;
    const canvas=await html2canvas(target,{
      backgroundColor:"#060d1a",
      scale:2,
      useCORS:true,
      logging:false,
      windowWidth:document.body.scrollWidth,
      windowHeight:document.body.scrollHeight,
      scrollX:0, scrollY:0,
    });

    if(type==="jpeg"){
      const link=document.createElement("a");
      link.download="wc2026_bst_timeline.jpg";
      link.href=canvas.toDataURL("image/jpeg",0.95);
      link.click();
    } else {
      const {jsPDF}=window.jspdf;
      const imgW=canvas.width, imgH=canvas.height;
      const ratio=imgH/imgW;
      const pdfW=297, pdfH=Math.min(pdfW*ratio, 1200);
      const pdf=new jsPDF({orientation:"landscape",unit:"mm",format:[pdfW,pdfH]});
      pdf.addImage(canvas.toDataURL("image/jpeg",0.95),"JPEG",0,0,pdfW,pdfH);
      pdf.save("wc2026_bst_timeline.pdf");
    }
  } catch(e) {
    msg.textContent="❌ Export failed: "+e.message;
    await new Promise(r=>setTimeout(r,2000));
  }
  msg.style.display="none";
}

function exportPDF(){ doExport("pdf"); }
function exportJPEG(){ doExport("jpeg"); }
